# ===== Server/Inventory =====
server:
  id: "self"                 # 本伺服器 ID（寫入/查詢時用）
  capacity_cpu: 100.0        # 物理上限（%）
  headroom: 0.80             # 安全係數（可用 = capacity_cpu * headroom）
  capacity_ram_mb: 8192
  headroom_ram: 0.80

# ===== LSTM 服務 =====
lstm:
  enabled: true
  base_url: "http://127.0.0.1:8900"
  timeout_ms: 1500

# ===== MLR 係數（可從離線訓練結果貼上）=====
regression:
  intercept: 5.0
  beta:
    AFK: 0.05
    Build: 0.70
    Explorer: 0.40
    Explosive: 1.50
    PvP: 1.60
    Redstone: 1.40
    Social: 0.35
    Survival: 0.60
  ar:
    y_lag1: 0.20
    y_lag2: 0.10

# ===== 類型單人成本（若不想用 beta 換算，可以直接指定）=====
unit_cost_cpu:
  AFK: 0.05
  Build: 0.70
  Explorer: 0.40
  Explosive: 1.50
  PvP: 1.60
  Redstone: 1.40
  Social: 0.35
  Survival: 0.60

unit_cost_ram_mb:              # ★ 每人/每類的 RAM 成本（MB/人）
  AFK: 5
  Build: 30
  Explorer: 20
  Explosive: 25
  PvP: 35
  Redstone: 40
  Social: 15
  Survival: 28

# ===== Autoscale =====
autoscale:
  cpu_steps: [100, 200, 300]
  ram_steps_mb: [5000, 9000] # >100% 開第2台、>200% 開第3台…（可依實測調）
  cooldown_minutes: 20
  hysteresis:
    up: 2
    down: 3

# ===== 規劃（Placement）=====
placement:
  migrate_penalty: 0.5          # 遷移懲罰
  allow_over_ratio: 0.05        # 允許輕微超量
  score:
    cpu_weight: 0.6            # ★ 分配評分中 CPU 權重
    ram_weight: 0.4
# ===== MySQL 連線 & 表名 =====
mysql:
  url: "jdbc:mysql://127.0.0.1:3306/mc_analytics?useSSL=false&serverTimezone=UTC"
  username: "mc_user"
  password: "mc_pass"
  pool_size: 6
tables:
  comp: "server_comp_30m"
  load: "server_load_30m"
  pred: "player_type_pred"
  horizon: 6                    # 取最近幾個視窗做序列

# ===== Paper-only 動作 =====
paper:
  move_via_proxy: false         # true: 透過 PluginMessaging 交給 Proxy 搬家
  log_plan_only: true           # true: 只log建議，不做任何移動（建議先開）
